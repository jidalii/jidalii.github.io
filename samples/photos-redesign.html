<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photos — studiokleiner-inspired</title>
<style>
  :root {
    --bg-page: #F2F1ED;
    --text: #141311;
    --muted: #6B665E;
    --accent: #C4A04A;
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
    --font-display: 'Source Serif 4', Georgia, serif;
    --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  [data-theme="dark"] { --bg-page: #141311; --text: #F0EDE7; --muted: #9C968D; }

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body {
    font-family: var(--font-body);
    background: var(--bg-page);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    padding: 140px 0 100px;
  }

  /* ── Header ── */
  .page-header {
    max-width: 1100px;
    margin: 0 auto 56px;
    padding: 0 28px;
  }
  .section-label {
    font-family: var(--font-mono); font-size: .72rem; font-weight: 500;
    color: var(--accent); letter-spacing: .14em;
    text-transform: uppercase; margin-bottom: 20px;
  }
  .page-header h1 {
    font-family: var(--font-display);
    font-size: clamp(2rem, 4vw, 2.8rem); font-weight: 500; margin-bottom: 12px;
  }
  .page-header p { color: var(--muted); max-width: 540px; font-size: 1rem; line-height: 1.7; }

  /* ── Theme toggle ── */
  .theme-btn {
    position: fixed; top: 16px; right: 16px; z-index: 10;
    background: var(--bg-page); border: 1px solid var(--muted);
    color: var(--text); padding: 6px 12px; border-radius: 20px;
    cursor: pointer; font-size: .8rem;
  }

  /* ── Photo Row — full-width colored band ── */
  .photo-row {
    width: 100%;
    padding: 60px 28px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0;
    /* bg set via JS — spans full viewport */
  }

  .photo-row img {
    display: block;
    border-radius: 4px;
    transition: transform .4s var(--ease-out-expo);
    object-fit: contain;
  }
  .photo-row:hover img { transform: scale(1.01); }

  /* Single: landscape photo, centered, constrained */
  .photo-row.single .photo-inner {
    max-width: 980px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 50vh;
  }
  .photo-row.single img {
    width: 100%;
    height: auto;
    max-height: 65vh;
  }

  /* Pair: two portraits side by side, each in its own 50% column */
  .photo-row.pair .photo-inner {
    width: 50%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 40vh;
    margin: 0 auto;
  }
  .photo-row.pair img {
    width: 100%;
    height: auto;
    max-height: 55vh;
  }

  /* ── Caption ── */
  .photo-caption {
    margin-top: 14px;
    font-family: var(--font-mono);
    font-size: .7rem;
    color: var(--muted);
    letter-spacing: .04em;
    opacity: .6;
    text-align: center;
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    body { padding-top: 120px; }
    .photo-row { padding: 32px 16px; }
    .photo-row.pair { flex-direction: column; gap: 24px; }
    .photo-row.pair .photo-wrap { max-width: 100%; }
  }
</style>
</head>
<body>

<button class="theme-btn" onclick="cycleTheme()">◐</button>

<header class="page-header">
  <p class="section-label">Gallery</p>
  <h1>Photos</h1>
  <p>A selection of moments captured on Nikon Z 6₂. Landscapes, streets, portraits.</p>
</header>

<!-- Photo rows: landscape gets single row, portrait/square get paired -->
<div id="gallery"></div>

<script>
/* ── Mat color assignment — cycle through palette, never repeat adjacent ── */
var MATS = ['#e5e9e1','#acc2b2','#e9e1e1','#e5e7e3','#d0d3dc','#acc2c2','#c6cfbe','#cfbecb','#e3e4e7','#c2bcac','#b1b4bd','#c6cbc2','#c2c4cb','#e1e9e3','#b7bdb1','#d6dcd0','#d2d9d9','#acb2c2','#d0dcd3','#d6d9d2','#cfcbbe','#c6c2cb','#e1e9e9','#b7b1bd','#cfbebe','#e3e7e4','#b1bdb4','#e5e1e9','#d9d2d2','#c2acbc','#e5e3e7','#b7acc2','#cbc9c2','#bdb1b1','#d9d2d7','#d2d9d4','#d2d4d9','#c2cbc4','#d6d2d9','#d9d7d2','#becfcf','#d6d0dc','#e3e7e7','#b1bdbd','#cbc2c9','#dcd9d0','#c6becf','#e7e3e6','#cbc2c2','#becfc2','#d0dcdc','#dcd0d0','#c2cbcb','#bdb1ba','#bec2cf','#e7e3e3','#dcd0d9','#bdbab1','#e9e1e7','#e9e7e1','#b7c2ac','#e1e3e9','#c2acac','#e7e6e3'];

// Split palette: warm tones vs cool tones
var WARM = [], COOL = [];
for (var i = 0; i < MATS.length; i++) {
  var r = parseInt(MATS[i].slice(1,3),16);
  var g = parseInt(MATS[i].slice(3,5),16);
  var b = parseInt(MATS[i].slice(5,7),16);
  // Warm if red dominates over blue
  if (r > b + 10) { WARM.push(MATS[i]); }
  else if (b > r + 5) { COOL.push(MATS[i]); }
  else { WARM.push(MATS[i]); COOL.push(MATS[i]); } // neutral → both pools
}

function shuffle(a) {
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

// Per-photo contrast-aware pick. Photo hash → warm/cool dominant → contrasting mat.
var lastColor = '';
function pickMat(photo) {
  // Determine photo's dominant tone from filename hash
  var h = 0;
  for (var i = 0; i < photo.src.length; i++) { h = ((h << 5) - h) + photo.src.charCodeAt(i); h |= 0; }
  var photoIsWarm = (Math.abs(h) % 2 === 0); // pseudo-random warm/cool classification

  // Pick contrasting pool
  var pool = photoIsWarm ? COOL : WARM;
  var color;
  // Find a color different from the last used
  for (var attempt = 0; attempt < pool.length; attempt++) {
    var c = pool[Math.floor(Math.random() * pool.length)];
    if (c !== lastColor) { color = c; break; }
  }
  if (!color) color = pool[0];
  lastColor = color;
  return color;
}

/* ── Photo data with aspect ratios ── */
var photos = [
  { src: '../public/images/photos/PS524083.jpg', alt: 'Portrait series', w: 3913, h: 5869 },
  { src: '../public/images/photos/DSC_6636.jpg',  alt: 'Panorama',       w: 5214, h: 2219 },
  { src: '../public/images/photos/PS524178.jpg',  alt: 'Landscape',      w: 6000, h: 4000 },
  { src: '../public/images/photos/PS524109.jpg',  alt: 'Shanghai',       w: 3003, h: 4505 },
  { src: '../public/images/photos/DSC_4534.JPG',  alt: 'Square',         w: 3080, h: 3080 },
  { src: '../public/images/photos/PS524352.jpg',  alt: 'Street',         w: 4454, h: 2969 },
  { src: '../public/images/photos/DSC_4645.JPG',  alt: 'Square II',      w: 3056, h: 3056 },
];

/* ── Layout: alternating single (w>h) → pair (w<=h) → single → pair → ... ── */
var gallery = document.getElementById('gallery');
var landscapes = photos.filter(function(p){ return p.w > p.h; });
var portraits  = photos.filter(function(p){ return p.w <= p.h; });

function makePhotoHTML(p) {
  return '<div class="photo-inner">'
    + '<img src="' + p.src + '" alt="' + p.alt + '" loading="lazy">'
    + (p.alt ? '<span class="photo-caption">' + p.alt + '</span>' : '')
    + '</div>';
}

function makeSingle(p) {
  var row = document.createElement('div');
  row.className = 'photo-row single';
  row.style.background = pickMat(p);
  row.innerHTML = makePhotoHTML(p);
  gallery.appendChild(row);
}

function makePair(a, b) {
  var row = document.createElement('div');
  row.className = 'photo-row pair';
  var colorA = pickMat(a), colorB = pickMat(b);
  row.style.background = 'linear-gradient(to right, ' + colorA + ' 0%, ' + colorA + ' 50%, ' + colorB + ' 50%, ' + colorB + ' 100%)';
  row.innerHTML = makePhotoHTML(a) + (b ? makePhotoHTML(b) : '');
  gallery.appendChild(row);
}

var li = 0, pi = 0;
while (li < landscapes.length || pi < portraits.length) {
  // Single row: landscape
  if (li < landscapes.length) { makeSingle(landscapes[li++]); }
  // Pair row: two portraits
  var a = portraits[pi++], b = portraits[pi++];
  if (a && b) { makePair(a, b); }
  else if (a) { makeSingle(a); }
}

/* ── Theme toggle ── */
function cycleTheme(){
  var h = document.documentElement;
  var cur = h.dataset.theme;
  if (!cur || cur === 'system') { h.dataset.theme = 'light'; }
  else if (cur === 'light') { h.dataset.theme = 'dark'; }
  else { h.removeAttribute('data-theme'); }
}
</script>
</body>
</html>
